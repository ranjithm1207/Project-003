<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedHealth AI — Reset Access</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.36.0/tabler-icons.min.css">

    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #0a0f1c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 212, 255, 0.3);
            --text-muted: #9aa4b2;
            --success: #10b981;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            filter: blur(120px);
            opacity: 0.6;
        }

        .blob-1 {
            background: #00d4ff;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            background: #6c5ce7;
            bottom: -100px;
            right: -100px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .login-box {
            width: 380px;
            padding: 2.5rem;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            background: rgba(0, 212, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary);
            border: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .logo-text {
            font-family: 'Outfit';
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            color: var(--primary);
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.5);
            color: var(--primary);
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #6c5ce7);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        .msg {
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .success-msg {
            color: var(--success);
            text-shadow: 0 0 5px var(--success);
        }

        .link-back {
            margin-top: 1.5rem;
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .link-back:hover {
            color: var(--primary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <div class="logo-icon"><i class="ti ti-key"></i></div>
                <div class="logo-text">Access<span>Reset</span></div>
            </div>

            {% if success %}
            <div class="msg success-msg">
                <i class="ti ti-circle-check"></i>
                PROTOCOL INITIATED.<br>Check System Admin console for the recovery override key.
            </div>
            <a href="/login" class="button"
                style="text-decoration:none; display:block; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; color: white; font-weight: 600;">RETURN
                TO LOGIN</a>
            {% else %}
            <p class="msg" style="color:var(--text-muted)">
                REQUEST EMERGENCY BIOMETRIC OVERRIDE OR SYSTEM OPERATOR ID RECOVERY
            </p>

            <form method="POST">
                <label>OPERATOR_EMAIL_OR_ID</label>
                <input type="text" name="identity" placeholder="operator@fedhealth.ai" required>
                <button type="submit">REQUEST RESET KEY</button>
            </form>
            {% endif %}

            <a href="/login" class="link-back"><i class="ti ti-arrow-left"></i> BACK TO LOGIN</a>
        </div>
    </div>
</body>

</html>
