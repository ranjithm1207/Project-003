<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedHealth AI — Secure Login</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.36.0/tabler-icons.min.css">

    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #0a0f1c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 212, 255, 0.3);
            --text-muted: #9aa4b2;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            overflow: hidden;
        }

        /* Background glow blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            filter: blur(120px);
            opacity: 0.6;
        }

        .blob-1 {
            background: #00d4ff;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            background: #6c5ce7;
            bottom: -100px;
            right: -100px;
        }

        /* Center container */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        /* Glass card */
        .login-box {
            width: 380px;
            padding: 2.5rem;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        /* Logo */
        .logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            background: rgba(0, 212, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary);
            border: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .logo-text {
            font-family: 'Outfit';
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            color: var(--primary);
        }

        /* Inputs */
        label {
            display: block;
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.5);
            color: var(--primary);
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #6c5ce7);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        /* Error */
        .error-msg {
            color: #ff4d6d;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        /* Footer note */
        .note {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <div class="login-box">

            <div class="logo-area">
                <div class="logo-icon"><i class="ti ti-heart-rate-monitor"></i></div>
                <div class="logo-text">FedHealth<span>AI</span></div>
            </div>

            <p style="color:var(--text-muted); font-size:0.8rem;">
                ENTERPRISE AUTHENTICATION PROTOCOL
            </p>


            <form method="POST" action="/login">
                <label>SYS_OPERATOR_ID</label>
                <input type="text" name="username" placeholder="admin" required>

                <label>ACCESS_KEY</label>
                <input type="password" name="password" placeholder="admin" required>

                <button type="submit">
                    <i class="ti ti-login"></i> INITIATE LOGIN
                </button>
                <div style="margin-top: 1rem; text-align: right;">
                    <a href="/forgot-password"
                        style="color: var(--primary); font-size: 0.75rem; text-decoration: none; opacity: 0.8; transition: 0.3s;">
                        FORGOT PASSWORD?
                    </a>
                </div>
            </form>

            <div class="note">
                Use credentials: admin / admin
            </div>

        </div>
    </div>

</body>

</html>
